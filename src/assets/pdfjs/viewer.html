<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow-x: hidden; }
    #viewer {
      width: 100%;
      padding: 0;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      margin-bottom: 8px;
    }
    #error {
      color: #ff6b6b;
      padding: 20px;
      font-family: sans-serif;
      font-size: 14px;
    }
    #loading {
      color: #888;
      padding: 20px;
      font-family: sans-serif;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="loading">Loading document…</div>
  <div id="error" style="display:none"></div>
  <div id="viewer"></div>

  <script type="module">
    import * as pdfjsLib from './pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.min.mjs';

    let bgColor = '#ffffff';
    let textColor = '#1a1a1a';

    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function renderPdf(data) {
      const loading = document.getElementById('loading');
      const errorDiv = document.getElementById('error');
      const viewer = document.getElementById('viewer');

      try {
        const pdf = await pdfjsLib.getDocument({ data }).promise;
        loading.style.display = 'none';

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const viewport = page.getViewport({ scale: window.devicePixelRatio || 2 });
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          canvas.style.background = bgColor;
          viewer.appendChild(canvas);
          await page.render({ canvasContext: ctx, viewport }).promise;
        }

        document.body.style.background = bgColor;

        // Report total pages back to RN
        window.ReactNativeWebView?.postMessage(JSON.stringify({ type: 'ready', pages: pdf.numPages }));
      } catch (e) {
        loading.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Failed to load PDF: ' + e.message;
        window.ReactNativeWebView?.postMessage(JSON.stringify({ type: 'error', message: e.message }));
      }
    }

    function handleMessage(data) {
      try {
        const msg = JSON.parse(data);
        if (msg.type === 'load') {
          if (msg.bgColor) { bgColor = msg.bgColor; textColor = msg.textColor || '#1a1a1a'; }
          document.body.style.background = bgColor;
          const uint8 = base64ToUint8Array(msg.base64);
          renderPdf(uint8);
        }
      } catch {}
    }

    window.addEventListener('message', (event) => handleMessage(event.data));
    document.addEventListener('message', (event) => handleMessage(event.data));
  </script>
</body>
</html>
