<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
</head>
<body>
  <!-- fflate: pure-JS DEFLATE fallback for Android 5–9 without DecompressionStream -->
  <script src="./fflate.umd.js"></script>

  <script>
    // EPUB plaintext extractor.
    // Dependencies: none (browser-native ZIP + OPF parsing).
    // Fallback: fflate UMD for DEFLATE on old Android WebViews without DecompressionStream.

    // ── DEFLATE decompression ────────────────────────────────────────────────

    async function inflateRaw(compressedBytes) {
      // Fast path: native Compression Streams API (Chromium 80+, Android 10+).
      if (typeof DecompressionStream !== 'undefined') {
        const ds = new DecompressionStream('deflate-raw');
        const writer = ds.writable.getWriter();
        const reader = ds.readable.getReader();
        writer.write(compressedBytes);
        writer.close();
        const chunks = [];
        let totalLen = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          totalLen += value.length;
        }
        const out = new Uint8Array(totalLen);
        let offset = 0;
        for (const chunk of chunks) { out.set(chunk, offset); offset += chunk.length; }
        return out;
      }

      // Fallback: fflate (loaded via <script src="./fflate.umd.js">).
      if (typeof fflate !== 'undefined') {
        return fflate.inflateSync(compressedBytes);
      }

      throw new Error('No DEFLATE decompressor available');
    }

    // ── ZIP parser ───────────────────────────────────────────────────────────

    function parseZipCentralDirectory(ab) {
      const view  = new DataView(ab);
      const bytes = new Uint8Array(ab);

      // Locate EOCD signature (0x06054b50) by scanning backwards.
      let eocdPos = -1;
      for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 65558); i--) {
        if (view.getUint32(i, true) === 0x06054b50) { eocdPos = i; break; }
      }
      if (eocdPos < 0) throw new Error('Not a valid ZIP/EPUB (EOCD not found)');

      const cdCount  = view.getUint16(eocdPos + 8,  true);
      const cdOffset = view.getUint32(eocdPos + 16, true);

      const entries = {};
      let pos = cdOffset;
      const dec = new TextDecoder('utf-8', { fatal: false });

      for (let i = 0; i < cdCount; i++) {
        if (view.getUint32(pos, true) !== 0x02014b50) break;
        const method      = view.getUint16(pos + 10, true);
        const compSize    = view.getUint32(pos + 20, true);
        const uncompSize  = view.getUint32(pos + 24, true);
        const nameLen     = view.getUint16(pos + 28, true);
        const extraLen    = view.getUint16(pos + 30, true);
        const commentLen  = view.getUint16(pos + 32, true);
        const localOffset = view.getUint32(pos + 42, true);
        const name = dec.decode(bytes.subarray(pos + 46, pos + 46 + nameLen));
        entries[name] = { method, compSize, uncompSize, localOffset };
        pos += 46 + nameLen + extraLen + commentLen;
      }
      return entries;
    }

    async function readZipEntry(ab, entry) {
      const view  = new DataView(ab);
      const bytes = new Uint8Array(ab);
      const loff  = entry.localOffset;

      // Skip local file header: signature(4) + fixed(26) + nameLen + extraLen
      const nameLen  = view.getUint16(loff + 26, true);
      const extraLen = view.getUint16(loff + 28, true);
      const start    = loff + 30 + nameLen + extraLen;
      const compressed = bytes.subarray(start, start + entry.compSize);

      // Method 0 = stored (no compression).
      if (entry.method === 0) {
        return new TextDecoder('utf-8', { fatal: false }).decode(compressed);
      }

      // Method 8 = DEFLATE.
      const decompressed = await inflateRaw(compressed);
      return new TextDecoder('utf-8', { fatal: false }).decode(decompressed);
    }

    // ── HTML → plain text ────────────────────────────────────────────────────
    //
    // Recursive DOM walk that preserves paragraph and heading structure.
    // We walk the tree ourselves rather than reading .textContent directly,
    // because .textContent collapses all block boundaries into nothing.

    const BLOCK_TAGS = new Set([
      'p','div','li','blockquote','pre','dd','dt',
      'tr','section','article','header','footer','figure',
    ]);
    const HEADING_TAGS = new Set(['h1','h2','h3','h4','h5','h6']);

    function walkNode(node, parts) {
      if (node.nodeType === 3) {          // Text node
        parts.push(node.textContent);
        return;
      }
      if (node.nodeType !== 1) return;   // Skip comments, PIs, etc.

      const tag = node.tagName.toLowerCase();

      if (tag === 'br') { parts.push('\n'); return; }
      if (tag === 'img' || tag === 'svg') return;  // skip non-text content

      const isBlock   = BLOCK_TAGS.has(tag);
      const isHeading = HEADING_TAGS.has(tag);

      // Headings get an extra blank line before them for separation.
      if (isHeading)    parts.push('\n\n');
      else if (isBlock) parts.push('\n');

      for (const child of node.childNodes) walkNode(child, parts);

      if (isBlock || isHeading) parts.push('\n');
    }

    function htmlToText(htmlString) {
      try {
        const doc = new DOMParser().parseFromString(htmlString, 'text/html');

        // Strip non-content elements before walking.
        doc.querySelectorAll(
          'script,style,nav,aside,[epub\\:type="toc"],[epub\\:type="landmarks"]'
        ).forEach(el => el.remove());

        const parts = [];
        walkNode(doc.body || doc.documentElement, parts);

        // Normalise: per-line whitespace collapse, then run of blank lines → max one.
        return parts.join('')
          .split('\n')
          .map(line => line.replace(/[ \t]+/g, ' ').trim())
          .join('\n')
          .replace(/\n{3,}/g, '\n\n')
          .trim();
      } catch {
        // Fallback: regex-based strip if DOMParser is unavailable.
        return htmlString
          .replace(/<\/?(p|div|li|br|h[1-6]|tr)[^>]*>/gi, '\n')
          .replace(/<[^>]+>/g, '')
          .replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&')
          .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"')
          .replace(/[ \t]+/g, ' ')
          .replace(/\n{3,}/g, '\n\n')
          .trim();
      }
    }

    // ── Path utilities ───────────────────────────────────────────────────────

    function resolveRelPath(baseDir, href) {
      if (!href) return '';
      const noFrag = href.split('#')[0];
      if (!noFrag) return '';
      // Already absolute URI - return as-is.
      if (/^[a-z][a-z0-9+\-.]*:/i.test(noFrag)) return noFrag;
      const combined = baseDir + noFrag;
      const parts = combined.split('/');
      const out = [];
      for (const p of parts) {
        if (p === '..') out.pop();
        else if (p && p !== '.') out.push(p);
      }
      return out.join('/');
    }

    // ── EPUB extraction ──────────────────────────────────────────────────────

    async function extractEpubText(ab) {
      const entries = parseZipCentralDirectory(ab);

      // 1. container.xml → OPF path.
      const containerEntry = entries['META-INF/container.xml'];
      if (!containerEntry) throw new Error('Missing META-INF/container.xml');
      const containerXml = await readZipEntry(ab, containerEntry);

      const opfMatch = containerXml.match(/full-path="([^"]+)"/);
      if (!opfMatch) throw new Error('container.xml has no full-path attribute');
      const opfPath = opfMatch[1];
      const opfDir  = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';

      // 2. OPF document.
      const opfEntry = entries[opfPath];
      if (!opfEntry) throw new Error('OPF not found: ' + opfPath);
      const opfXml = await readZipEntry(ab, opfEntry);

      // 3. Manifest: build id → href map.
      //    Handle both attribute orderings (id first or href first).
      const manifest = {};
      for (const m of opfXml.matchAll(/<item\b[^>]+?id="([^"]+)"[^>]+?href="([^"]+)"/gi))
        manifest[m[1]] = m[2];
      for (const m of opfXml.matchAll(/<item\b[^>]+?href="([^"]+)"[^>]+?id="([^"]+)"/gi))
        if (!manifest[m[2]]) manifest[m[2]] = m[1];

      // 4. Spine: ordered idrefs (scoped to <spine> element to avoid NCX stray matches).
      const spineBlock = opfXml.match(/<spine\b[^>]*>([\s\S]*?)<\/spine>/i);
      const spineXml   = spineBlock ? spineBlock[1] : opfXml;
      const spineIds   = [...spineXml.matchAll(/<itemref\b[^>]+?idref="([^"]+)"/gi)].map(m => m[1]);

      // 5. Extract and convert each spine item.
      const chapterTexts = [];
      for (const id of spineIds) {
        const href = manifest[id];
        if (!href) continue;
        const fullPath = resolveRelPath(opfDir, href);
        const entry = entries[fullPath];
        if (!entry) continue;
        const html = await readZipEntry(ab, entry);
        const text = htmlToText(html);
        // Skip very short items: cover images, blank pages, NCX stubs.
        if (text.length > 80) chapterTexts.push(text);
      }

      // Fallback: if spine yielded nothing, scan all XHTML files.
      if (chapterTexts.length === 0) {
        const xhtmlNames = Object.keys(entries).filter(
          name => /\.(x?html?)$/i.test(name) && !name.startsWith('META-INF')
        );
        for (const name of xhtmlNames) {
          const html = await readZipEntry(ab, entries[name]);
          const text = htmlToText(html);
          if (text.length > 80) chapterTexts.push(text);
        }
      }

      return {
        text: chapterTexts.join('\n\n'),
        totalChapters: chapterTexts.length,
      };
    }

    // ── Entry point ──────────────────────────────────────────────────────────

    function base64ToArrayBuffer(base64) {
      const binary = atob(base64);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    window.handleMessage = async function(data) {
      try {
        const msg = typeof data === 'string' ? JSON.parse(data) : data;
        if (msg.type !== 'load') return;

        try {
          const ab = base64ToArrayBuffer(msg.base64);
          const { text, totalChapters } = await extractEpubText(ab);
          window.ReactNativeWebView?.postMessage(JSON.stringify({
            type: 'textExtracted',
            text,
            totalChapters,
          }));
        } catch (e) {
          window.ReactNativeWebView?.postMessage(JSON.stringify({
            type: 'error',
            message: String(e?.message ?? e),
          }));
        }
      } catch {}
    };

    window.addEventListener('message', e => window.handleMessage(e.data));
    document.addEventListener('message', e => window.handleMessage(e.data));
  </script>
</body>
</html>
